        function pcmToWav(pcmData, sampleRate = 24000, numChannels = 1) {
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * 2, true);
            view.setUint16(32, numChannels * 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, pcmData.length * 2, true);

            let offset = 44;
            for (let i = 0; i < pcmData.length; i++, offset += 2) {
                view.setInt16(offset, pcmData[i], true);
            }
            return new Blob([buffer], { type: 'audio/wav' });
        }

        function base64ToArrayBuffer(base64) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

                        }

            };

            const toggleListening = () => {
                if (!speechRecognitionRef.current) return;
                if (isListening) {
                    speechRecognitionRef.current.stop();
                    setIsListening(false);
                } else {
                    try {
                        speechRecognitionRef.current.start();
                        setIsListening(true);
                    } catch (e) { console.error(e); }

            };

            const callGeminiChatAPI = async (messages, currentConfig) => {
                const roleTitle = currentConfig.role === 'Custom' 
                    ? `${currentConfig.customRole.name} (${currentConfig.customRole.personality}, ${currentConfig.customRole.style})`
                    : currentConfig.role;

                const loc = currentConfig.location === 'Custom' ? currentConfig.customLocation : currentConfig.location;
                const timeVal = currentConfig.time === 'Custom' ? currentConfig.customTime : currentConfig.time;
                const goalVal = currentConfig.goal === 'Custom' ? currentConfig.scenarioText : currentConfig.goal;

                const systemPrompt = `
Anda adalah partner percakapan bahasa Jepang interaktif.
ATURAN PERAN KETAT:
- Karakter Peran: ${roleTitle}
- Lokasi: ${loc}
- Waktu/Musim: ${timeVal}
- Tingkat Kesulitan: ${currentConfig.level}
- Gaya Bahasa: ${currentConfig.style}
- Tujuan Percakapan: ${goalVal}
- Panjang Respon AI: ${currentConfig.length}
- Skenario Tambahan: ${currentConfig.scenarioText || 'Tidak ada'}

ATURAN UTAMA:
1. Tetap berada dalam karakter (never break character).
2. Tulis balasan bahasa Jepang yang sangat alami sesuai level ${currentConfig.level}.
3. Untuk tag HTML furigana pada "furigana_html", selalu gunakan sintaks HTML baku: <ruby>漢字<rt>かんじ</rt></ruby>.
4. Jika pengguna membuat kesalahan dalam bahasa Jepang (tata bahasa, partikel, keigo, kosakata):
   - Jawablah terlebih dahulu secara natural untuk menjaga alur percakapan.
   - Kemudian berikan koreksi dalam properti "user_correction".
5. Kembalikan HANYA format JSON valid tanpa markdown wrapper jika memungkinkan.
`;

                const promptPayload = {
                    contents: messages.map(m => ({
                        role: m.sender === 'user' ? 'user' : 'model',
                        parts: [{ text: typeof m.content === 'string' ? m.content : JSON.stringify(m.content) }]
                    })),
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {

                                "furigana_html": { "type": "STRING", "description": "Teks bahasa Jepang bermata kanji dengan tag HTML <ruby>kanji<rt>yomi</rt></ruby>" },
                                "indonesian_translation": { "type": "STRING", "description": "Terjemahan Bahasa Indonesia" },
                                "explanation": { "type": "STRING", "description": "Penjelasan tata bahasa dan kosakata" },

                                    "items": { "type": "STRING" },

                                "native_version": { "type": "STRING", "description": "Versi paling alami penutur asli Jepang" },

                                        "user_original": { "type": "STRING" },

                                    }
                                }
                            },
                            required: ["ai_response_ja", "furigana_html", "indonesian_translation", "explanation", "alternatives", "native_version"]

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(promptPayload)
                });

                if (!response.ok) {
                    throw new Error(`Gagal menghubungkan ke AI (Status: ${response.status}). Periksa API Key Anda.`);

                if (!jsonText) throw new Error("Respons AI kosong.");

                jsonText = jsonText.replace(/^```json\s*/i, '').replace(/\s*```$/i, '').trim();
                return JSON.parse(jsonText);
            };

            const playJapaneseTTS = async (text, index) => {
                if (audioPlayingIndex === index) {
                    setAudioPlayingIndex(null);
                    window.speechSynthesis?.cancel();
                    return;
                }
                setAudioPlayingIndex(index);

                try {
                    const activeKey = apiKey.trim() || DEFAULT_GEMINI_KEY;
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${activeKey}`;
                    
                    const payload = {
                        contents: [{ parts: [{ text: `Say naturally in Japanese: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: {
                                    prebuiltVoiceConfig: { voiceName: "Aoede" }
                                }
                            }
                        }
                    };

                    const res = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await res.json();
                    const part = data?.candidates?.[0]?.content?.parts?.[0];
                    const audioData = part?.inlineData?.data;
                    const mimeType = part?.inlineData?.mimeType;

                    if (audioData && mimeType && mimeType.startsWith("audio/")) {
                        const sampleRateMatch = mimeType.match(/rate=(\d+)/);
                        const sampleRate = sampleRateMatch ? parseInt(sampleRateMatch[1], 10) : 24000;
                        const pcmBuffer = base64ToArrayBuffer(audioData);
                        const pcm16 = new Int16Array(pcmBuffer);
                        const wavBlob = pcmToWav(pcm16, sampleRate);
                        const audioUrl = URL.createObjectURL(wavBlob);

                        const audio = new Audio(audioUrl);
                        audio.onended = () => setAudioPlayingIndex(null);
                        audio.onerror = () => fallbackWebSpeech(text, index);
                        await audio.play();
                        return;
                    }
                } catch (e) {
                    console.warn("Gemini TTS fallback:", e);
                }

                fallbackWebSpeech(text, index);
            };

            const fallbackWebSpeech = (text, index) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'ja-JP';
                    utterance.rate = 0.9;
                    utterance.onend = () => setAudioPlayingIndex(null);
                    utterance.onerror = () => setAudioPlayingIndex(null);
                    window.speechSynthesis.speak(utterance);
                } else {
                    setAudioPlayingIndex(null);
                }
            };

            const handleStartSession = async () => {
                setIsLoading(true);
                setActiveTab('chat');
                setChatMessages([]);
                setSessionStartTime(Date.now());
                setCurrentSessionId('session_' + Date.now());

                try {
                    const initialUserPrompt = [{

                        content: `[Sistem: Sesi dimulai. Berikan sapaan pembuka pertama dalam peran ${sessionConfig.role} di tempat ${sessionConfig.location}, sesuai waktu ${sessionConfig.time}.]`

                    const aiResponse = await callGeminiChatAPI(initialUserPrompt, sessionConfig);

                        id: Date.now(),
                        sender: 'ai',
                        data: aiResponse,
                        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })

                    setChatMessages([firstMessage]);

                    alert("Gagal memulai sesi: " + err.message);
                    setActiveTab('setup');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleSendMessage = async (textToSend = null) => {
                const text = textToSend || inputMessage;
                if (!text.trim() || isLoading) return;

                setInputMessage('');
                if (isListening && speechRecognitionRef.current) {
                    speechRecognitionRef.current.stop();
                    setIsListening(false);
                }

                const userMsgObj = {
                    id: Date.now(),
                    sender: 'user',
                    content: text,
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                const updatedMessages = [...chatMessages, userMsgObj];
                setChatMessages(updatedMessages);
                setIsLoading(true);

                try {
                    const formattedHistory = updatedMessages.map(m => ({
                        sender: m.sender,
                        content: m.sender === 'user' ? m.content : m.data?.ai_response_ja || ''
                    }));

                    const aiResponse = await callGeminiChatAPI(formattedHistory, sessionConfig);
                    const aiMsgObj = {
                        id: Date.now() + 1,
                        sender: 'ai',
                        data: aiResponse,
                        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    };

                    setChatMessages(prev => [...prev, aiMsgObj]);
                    if (sessionConfig.mode === 'voice') {
                        playJapaneseTTS(aiResponse.ai_response_ja, updatedMessages.length);
                    }
                } catch (err) {
                    alert("Terjadi kesalahan: " + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

                    const activeKey = apiKey.trim() || DEFAULT_GEMINI_KEY;
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${activeKey}`;
                    const historyContext = chatMessages.slice(-4).map(m => `${m.sender}: ${m.sender === 'user' ? m.content : m.data?.ai_response_ja}`).join('\n');

                    const payload = {
                        contents: [{
                            parts: [{
                                text: `Berdasarkan riwayat percakapan berikut:\n${historyContext}\n\nBerikan 3 contoh balasan bahasa Jepang yang alami yang bisa dikatakan pengguna saat ini sesuai level ${sessionConfig.level}. Sertakan terjemahan Indonesia.`
                            }]
                        }],
                        generationConfig: {
                            responseMimeType: "application/json",

                                type: "ARRAY",
                                items: {
                                    type: "OBJECT",
                                    properties: {
                                        "japanese": { "type": "STRING" },
                                        "indonesian": { "type": "STRING" }

                                    required: ["japanese", "indonesian"]

                        headers: { 'Content-Type': 'application/json' },

                    const data = await res.json();
                    let rawText = data?.candidates?.[0]?.content?.parts?.[0]?.text || '[]';
                    rawText = rawText.replace(/^```json\s*/i, '').replace(/\s*```$/i, '').trim();
                    setHints(JSON.parse(rawText));

                    setIsLoadingHints(false);

                    return;

${chatLog}

Skenario:
- Peran AI: ${sessionConfig.role}
- Level Target: ${sessionConfig.level}

Berikan nilai (0-100) dan ringkasan untuk:
1. Grammar
2. Vocabulary
3. Naturalness
4. Fluency
5. Pronunciation

Kelompokkan kesalahan ke dalam kategori: Partikel, Tata Bahasa, Pilihan Kata, Keigo, Pengucapan.
`;

                    const payload = {
                        contents: [{ parts: [{ text: evalPrompt }] }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    "scores": {
                                        "type": "OBJECT",
                                        "properties": {
                                            "grammar": { "type": "NUMBER" },
                                            "vocabulary": { "type": "NUMBER" },

                                            "fluency": { "type": "NUMBER" },
                                            "pronunciation": { "type": "NUMBER" },
                                            "overall": { "type": "NUMBER" }

                                            "properties": {
                                                "category": { "type": "STRING" },
                                                "user_said": { "type": "STRING" },
                                                "better_way": { "type": "STRING" },
                                                "explanation": { "type": "STRING" }
                                            },
                                            "required": ["category", "user_said", "better_way", "explanation"]
                                        }
                                    },

                                    "summary": { "type": "STRING" }
                                },
                                required: ["scores", "mistakes_breakdown", "strengths", "improvements", "summary"]
                            }
                        }
                    };

                    const res = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await res.json();
                    let rawText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                    rawText = rawText.replace(/^```json\s*/i, '').replace(/\s*```$/i, '').trim();

                        <div>
                            <h2 className="text-2xl font-black text-slate-800">Riwayat Percakapan</h2>
                            <p className="text-xs text-slate-500">Sesi tersimpan secara lokal di perangkat Anda</p>
                        </div>
                        {history.length > 0 && (
                            <button
                                onClick={onClearHistory}
                                className="px-3 py-1.5 text-xs text-rose-600 hover:bg-rose-50 rounded-xl border border-rose-200 font-bold"
                            >
                                Hapus Riwayat
                            </button>
                        )}
                    </div>

                    {history.length === 0 ? (
                        <div className="text-center py-16 bg-white rounded-3xl border border-slate-200 text-slate-400 space-y-2">
                            <i className="fa-solid fa-inbox text-3xl"></i>
                            <p className="text-xs font-bold">Belum Ada Sesi Tersimpan</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {history.map((sess) => (
                                <div
                                    key={sess.id}
                                    onClick={() => onSelectSession(sess)}
                                    className="p-4 bg-white hover:bg-slate-50 rounded-2xl border border-slate-200 transition-all cursor-pointer flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 shadow-sm"
                                >
                                    <div className="space-y-1">
                                        <div className="flex items-center gap-2">
                                            <span className="font-bold text-slate-800 text-sm">{sess.role}</span>
                                            <span className="text-[10px] bg-rose-50 text-rose-700 border border-rose-100 px-2 py-0.2 rounded-full font-mono">
                                                {sess.level}
                                            </span>
                                        </div>
                                        <p className="text-xs text-slate-400">
                                            📍 {sess.location} • ⏱️ {sess.duration} • 📅 {sess.date}
                                        </p>
                                    </div>
                                    {sess.scores && (
                                        <div className="flex items-center gap-3">
                                            <span className="text-xl font-black text-emerald-600">{sess.scores.overall || 85}</span>
                                            <i className="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
