                                                            btnStyle = "bg-rose-500 border-rose-600 text-white ring-2 ring-rose-200";

                                                            btnStyle = "bg-slate-50 text-slate-400 border-slate-100 opacity-60 pointer-events-none";

                                                    return (
                                                        <button key={opt} disabled={submitted} onClick={() => onSelect(q.id, choiceVal)}

                                                            <span>{opt}</span>
                                                        </button>

                                        ) : (

                                                                const isSelected = answers[`${dayKey}_${part.id}`] === choiceVal;
                                                                let btnStyle = "bg-slate-50 hover:bg-slate-100 border-slate-200 text-slate-700";
                                                                if (isSelected) btnStyle = "bg-slate-800 border-slate-900 text-white ring-2 ring-slate-200";

                                                                if (submitted) {
                                                                    if (choiceVal === part.ans) {
                                                                        btnStyle = "bg-emerald-500 border-emerald-600 text-white font-bold ring-2 ring-emerald-200";
                                                                    } else if (isSelected) {
                                                                        btnStyle = "bg-rose-500 border-rose-600 text-white ring-2 ring-rose-200";
                                                                    } else {
                                                                        btnStyle = "bg-slate-50 text-slate-400 border-slate-100 opacity-60 pointer-events-none";
                                                                    }
                                                                }

                                                                return (
                                                                    <button key={opt} disabled={submitted} onClick={() => onSelect(part.id, choiceVal)}
                                                                        className={`p-3 w-1/2 text-left rounded-xl border text-sm transition-all japanese-text font-medium ${btnStyle}`}>
                                                                        <span>{opt}</span>
                                                                    </button>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }

        function PracticePart2({ dayKey, badgeText, questions, answers, submitted, onSelectSeq, showIndoTrans }) {
            return (

                                <div key={q.id} className="pt-8 first:pt-0">

                                            {showIndoTrans && q.trans && (

                                            <div className="text-lg text-slate-800 font-bold mb-6 flex flex-wrap items-center gap-2 japanese-text">
                                                <span>{q.prefix}</span>

                                                    const correctVal = q.ans[slotIdx];

                                                            <select disabled={submitted} value={currentVal || ""}

                                                                className={`w-14 h-11 text-center font-extrabold border-b-2 bg-transparent focus:outline-none transition-all rounded ${borderStyle}`}>

                                                                <option value="3">3</option>

        function App() {
            const [currentView, setCurrentView] = useState('landing'); 
            const [comingSoonDay, setComingSoonDay] = useState({ week: CURRENT_WEEK, day: 1 });

            const [showIndoTrans, setShowIndoTrans] = useState(() => {

                } catch (e) {
                    return false;
                }
            });

            const [userAnswers, setUserAnswers] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_grammar_userAnswers');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) { return {}; }
            });

            const [submittedDays, setSubmittedDays] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_grammar_submittedDays');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) { return {}; }
            });

            const [scores, setScores] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_grammar_scores');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) { return {}; }
            });

            const [grammarUnderstanding, setGrammarUnderstanding] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_grammar_understanding');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) { return {}; }
            });

            const [userAnswersD7, setUserAnswersD7] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_grammar_userAnswersD7');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) { return {}; }
            });

            const [submittedD7, setSubmittedD7] = useState(() => {
                try {
                    return localStorage.getItem('ns_grammar_submittedD7') === 'true';
                } catch (e) { return false; }
            });

            const [scoreD7, setScoreD7] = useState(() => {

                    const saved = localStorage.getItem('ns_grammar_scoreD7');
                    return saved ? parseInt(saved, 10) : 0;
                } catch (e) { return 0; }

            const [showResetConfirm, setShowResetConfirm] = useState(false);

            useEffect(() => {
                localStorage.setItem('ns_grammar_showIndoTrans', showIndoTrans.toString());

            useEffect(() => {
                localStorage.setItem('ns_grammar_userAnswers', JSON.stringify(userAnswers));
            }, [userAnswers]);

            useEffect(() => {
                localStorage.setItem('ns_grammar_submittedDays', JSON.stringify(submittedDays));
            }, [submittedDays]);

            useEffect(() => {

            useEffect(() => {

            }, [submittedD7]);

            const handleResetAllProgress = () => {
                localStorage.clear();
                setUserAnswers({});
                setSubmittedDays({});
                setScores({});
                setUserAnswersD7({});
                setSubmittedD7(false);
                setScoreD7(0);
                setGrammarUnderstanding({});
                setShowResetConfirm(false);

            const handleToggleUnderstood = (dayKey, gpNum) => {
                setGrammarUnderstanding(prev => ({
                    ...prev,
                    [`${dayKey}_${gpNum}`]: !prev[`${dayKey}_${gpNum}`]

            const handleSelectVal = (dayKey, questionId, val) => {
                if (submittedDays[dayKey]) return;
                setUserAnswers(prev => ({ ...prev, [`${dayKey}_${questionId}`]: val }));

            const handleSelectSeq = (dayKey, questionId, slotIndex, numValue) => {
                if (submittedDays[dayKey]) return;
                setUserAnswers(prev => {
                    const currentSeq = prev[`${dayKey}_${questionId}`] ? [...prev[`${dayKey}_${questionId}`]] : [null, null, null, null];
                    currentSeq[slotIndex] = numValue;
                    return { ...prev, [`${dayKey}_${questionId}`]: currentSeq };

            const calculateResults = (dayKey) => {
                const lesson = LESSON_DATA[dayKey];
                let correctCount = 0;

                lesson.practice1.forEach(q => {
                    if (q.type === 'dual_mc') {
                        const isAllCorrect = q.parts.every(part => userAnswers[`${dayKey}_${part.id}`] === part.ans);
                        if (isAllCorrect) correctCount++;
                    } else {
                        if (userAnswers[`${dayKey}_${q.id}`] === q.ans) correctCount++;
                    }

                lesson.practice2.forEach(q => {
                    const userSeq = userAnswers[`${dayKey}_${q.id}`] || [null, null, null, null];
                    if (JSON.stringify(userSeq) === JSON.stringify(q.ans)) correctCount++;
                });

                setScores(prev => ({ ...prev, [dayKey]: correctCount }));
                setSubmittedDays(prev => ({ ...prev, [dayKey]: true }));
                window.scrollTo({ top: 0, behavior: 'smooth' });

                setSubmittedDays(prev => ({ ...prev, [dayKey]: false }));

                setUserAnswers(prev => {

                    Object.keys(updated).forEach(key => {

                    return updated;

                setUserAnswersD7(prev => ({ ...prev, [qId]: optionIdx }));
