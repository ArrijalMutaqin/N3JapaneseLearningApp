                                        onClick={() => setIsFlipped(!isFlipped)}
                                    >
                                        <div className={`flashcard w-full h-full rounded-3xl shadow-sm relative border border-slate-200/80 ${isFlipped ? 'flipped' : ''}`}>
                                            {/* FRONT */}
                                            <div className="flashcard-front bg-white rounded-3xl p-6 flex flex-col justify-between items-center">
                                                <div className="w-full flex justify-between items-center">
                                                    <span className="text-[9px] font-black text-slate-300 uppercase tracking-widest">Depan (Kanji)</span>
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); playJapaneseTTS(activeKanjiItem.kanji); }}
                                                        className="p-2.5 bg-slate-50 hover:bg-indigo-50 rounded-full text-slate-400 hover:text-indigo-600 transition"
                                                    >
                                                        <i className="fa-solid fa-volume-high text-sm"></i>
                                                    </button>
                                                </div>
                                                <div className="text-center">
                                                    <h1 className="text-6xl font-black text-indigo-950 tracking-wide mb-3 font-mono japanese-text">
                                                        {activeKanjiItem.kanji}
                                                    </h1>
                                                    <span className="text-[10px] text-slate-400 bg-slate-100 px-3 py-1.5 rounded-full font-bold">
                                                        Ketuk untuk membalik <i className="fa-solid fa-arrows-rotate ml-1"></i>
                                                    </span>
                                                </div>
                                                <div className="w-full text-center text-[10px] text-slate-300 font-bold tracking-wide">
                                                    N3 KANJI • WEEK 2
                                                </div>
                                            </div>

                                            {/* BACK */}
                                            <div className="flashcard-back bg-gradient-to-br from-indigo-950 to-slate-900 text-white rounded-3xl p-6 flex flex-col justify-between">
                                                <div className="w-full flex justify-between items-center">
                                                    <span className="text-[9px] font-black text-indigo-300 uppercase tracking-widest">Belakang (Makna)</span>
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); playJapaneseTTS(activeKanjiItem.kanji); }}
                                                        className="p-2.5 bg-white/10 hover:bg-white/20 rounded-full text-indigo-200 hover:text-white transition"
                                                    >
                                                        <i className="fa-solid fa-volume-high text-sm"></i>
                                                    </button>
                                                </div>
                                                <div className="text-center space-y-3 px-2">
                                                    <span className="text-amber-300 text-xl font-bold tracking-wide font-mono block japanese-text">
                                                        {activeKanjiItem.furigana}
                                                    </span>
                                                    <h2 className="text-2xl font-black text-white tracking-tight leading-tight">
                                                        {activeKanjiItem.meaning}
                                                    </h2>
                                                    <div className="pt-2 border-t border-white/10 max-w-xs mx-auto">
                                                        <p className="text-xs text-slate-300 italic leading-relaxed text-center">
                                                            {activeKanjiItem.example}
                                                        </p>
                                                    </div>
                                                </div>
                                                <div className="flex justify-center">
                                                    <span className="text-[9px] text-indigo-200 bg-white/5 px-3 py-1.5 rounded-full font-bold">
                                                        Ketuk untuk membalik kembali <i className="fa-solid fa-arrows-rotate ml-1"></i>
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Flashcard Controls */}
                                    <div className="mt-6 flex justify-between items-center gap-3">
                                        <button 
                                            onClick={() => {
                                                setIsFlipped(false);
                                                setCurrentFlashIndex(prev => Math.max(0, prev - 1));
                                            }}
                                            className="bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 p-4 rounded-xl transition shadow-sm disabled:opacity-40"
                                            disabled={currentFlashIndex === 0}
                                        >
                                            <i className="fa-solid fa-chevron-left text-sm"></i>
                                        </button>

                                        <button 
                                            onClick={() => handleToggleLearned(activeKanjiItem.id)}
                                            className={`flex-grow py-3.5 px-4 rounded-xl font-bold text-xs transition shadow-sm flex items-center justify-center space-x-2 ${
                                                learnedStatus[activeKanjiItem.id]
                                                    ? 'bg-emerald-500 hover:bg-emerald-600 text-white'
                                                    : 'bg-white hover:bg-slate-50 border border-slate-200 text-slate-700'
                                            }`}
                                        >
                                            <i className={`fa-solid ${learnedStatus[activeKanjiItem.id] ? 'fa-circle-check' : 'fa-circle'}`}></i>
                                            <span>{learnedStatus[activeKanjiItem.id] ? 'Sudah Hafal' : 'Tandai Sudah Hafal'}</span>
                                        </button>

                                        <button 
                                            onClick={() => {
                                                setIsFlipped(false);
                                                setCurrentFlashIndex(prev => Math.min(filteredKanjiList.length - 1, prev + 1));
                                            }}
                                            className="bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 p-4 rounded-xl transition shadow-sm disabled:opacity-40"
                                            disabled={currentFlashIndex === filteredKanjiList.length - 1}
                                        >
                                            <i className="fa-solid fa-chevron-right text-sm"></i>
                                        </button>
                                    </div>
                                </div>

                                {/* Dictionary Search Grid */}
                                <div className="bg-white rounded-3xl p-6 md:p-8 border border-slate-200 shadow-sm">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                                        <div>
                                            <h3 className="text-base font-bold text-slate-900">Daftar Kanji Hari Ini</h3>
                                            <p className="text-xs text-slate-500">Pencarian cepat Kanji, furigana, dan makna.</p>
                                        </div>
                                        <div className="relative w-full sm:w-64">
                                            <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                                <i className="fa-solid fa-magnifying-glass text-xs"></i>
                                            </span>
                                            <input 
                                                type="text" 
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                                placeholder="Cari Kanji..." 
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl py-2 pl-9 pr-4 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                                            />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {filteredDictionaryGrid.map((item) => (
                                            <div 
                                                key={item.id} 
                                                onClick={() => playJapaneseTTS(item.kanji)}
                                                className="p-4 border border-slate-100 rounded-2xl bg-slate-50 hover:bg-indigo-50/30 transition cursor-pointer flex items-start gap-4 relative overflow-hidden"
                                            >
                                                {learnedStatus[item.id] && (
                                                    <div className="absolute right-0 top-0 bg-emerald-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-bl-lg">
                                                        Hafal
                                                    </div>
                                                )}
                                                <div className="text-3xl font-black text-indigo-950 japanese-text pt-1">
                                                    {item.kanji}
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <div className="text-xs font-bold text-indigo-600 japanese-text">{item.furigana}</div>
                                                    <h4 className="text-sm font-bold text-slate-800 truncate">{item.meaning}</h4>
                                                    <p className="text-[11px] text-slate-500 italic truncate mt-1">{item.example}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB QUIZ */}
                        {activeTab === 'quiz' && (
                            <div className="max-w-xl mx-auto animate-fade-in">
                                {quizStep === 'start' && (
                                    <div className="text-center space-y-6 py-8">
                                        <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto shadow-inner">
                                            <i className="fa-solid fa-graduation-cap text-3xl"></i>
                                        </div>
                                        <div>
                                            <h2 className="text-2xl font-black text-slate-900 tracking-tight">Kuis Kanji Hari Ke-{selectedDay}</h2>
                                            <p className="text-sm text-slate-500 mt-2">Uji ingatan Anda terhadap materi Kanji Minggu ke-2 yang telah dipelajari.</p>
                                        </div>
                                        <button 
                                            onClick={() => setQuizStep('active')}
                                            className="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-4 px-10 rounded-2xl shadow-md transition inline-block text-xs uppercase tracking-wider active:scale-95"
                                        >
                                            Mulai Kuis Sekarang
                                        </button>
                                    </div>
                                )}

                                {quizStep === 'active' && filteredQuizQuestions.length > 0 && (
                                    <div className="space-y-6">
                                        <div className="space-y-2">
                                            <div className="flex justify-between items-center text-xs text-slate-500">
                                                <span className="font-black text-indigo-600 uppercase tracking-widest">
                                                    {filteredQuizQuestions[currentQuizIndex].section}
                                                </span>
                                                <span className="font-bold">
                                                    Soal {currentQuizIndex + 1} dari {filteredQuizQuestions.length}
                                                </span>
                                            </div>
                                            <div className="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden">
                                                <div 
                                                    className="bg-indigo-600 h-full transition-all duration-300" 
                                                    style={{ width: `${((currentQuizIndex) / filteredQuizQuestions.length) * 100}%` }}
                                                ></div>
                                            </div>
                                        </div>

                                        <div className="bg-white rounded-3xl p-6 md:p-8 border border-slate-200 shadow-sm space-y-6">
                                            <h3 className="text-xl font-bold text-slate-900 leading-relaxed japanese-text" dangerouslySetInnerHTML={{ __html: filteredQuizQuestions[currentQuizIndex].question }}></h3>

                                            <div className="space-y-3">
                                                {filteredQuizQuestions[currentQuizIndex].options.map((option, optIdx) => {
                                                    const isSelected = selectedOption === optIdx;
                                                    const isCorrectAnswer = optIdx === filteredQuizQuestions[currentQuizIndex].correctIndex;
                                                    let optStyle = "bg-slate-50 hover:bg-slate-100 border-slate-200 text-slate-700";
                                                    
                                                    if (isSelected) optStyle = "bg-indigo-600 border-indigo-700 text-white ring-2 ring-indigo-200";
                                                    if (hasSubmittedAnswer) {
                                                        if (isCorrectAnswer) optStyle = "bg-emerald-500 border-emerald-600 text-white font-bold ring-2 ring-emerald-200";
                                                        else if (isSelected) optStyle = "bg-rose-500 border-rose-600 text-white ring-2 ring-rose-200";
                                                        else optStyle = "bg-slate-50 text-slate-400 border-slate-100 opacity-60 pointer-events-none";
                                                    }

                                                    return (
                                                        <button
                                                            key={optIdx}
                                                            disabled={hasSubmittedAnswer}
                                                            onClick={() => setSelectedOption(optIdx)}
                                                            className={`p-4 w-full text-left rounded-2xl border text-sm transition-all flex items-center justify-between japanese-text font-medium ${optStyle}`}
                                                        >
                                                            <span>{option}</span>
                                                        </button>
                                                    );
                                                })}
                                            </div>

                                            {hasSubmittedAnswer && (
                                                <div className={`rounded-2xl p-4 text-xs leading-relaxed ${selectedOption === filteredQuizQuestions[currentQuizIndex].correctIndex ? 'bg-emerald-50 text-emerald-900' : 'bg-rose-50 text-rose-900'}`} dangerouslySetInnerHTML={{ __html: filteredQuizQuestions[currentQuizIndex].explanation }}></div>
                                            )}
                                        </div>

                                        <div className="flex justify-end">
                                            {!hasSubmittedAnswer ? (
                                                <button 
                                                    disabled={selectedOption === null}
                                                    onClick={() => {
                                                        setHasSubmittedAnswer(true);
                                                        if (selectedOption === filteredQuizQuestions[currentQuizIndex].correctIndex) {
                                                            setQuizScore(prev => prev + 1);
                                                        }
                                                    }}
                                                    className={`font-extrabold py-3.5 px-8 rounded-2xl transition text-xs uppercase tracking-wider ${selectedOption !== null ? 'bg-slate-900 text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                                                >
                                                    Periksa
                                                </button>
                                            ) : (
                                                <button 
                                                    onClick={() => {
                                                        if (currentQuizIndex + 1 < filteredQuizQuestions.length) {
                                                            setCurrentQuizIndex(prev => prev + 1);
                                                            setSelectedOption(null);
                                                            setHasSubmittedAnswer(false);
                                                        } else {
                                                            setQuizStep('result');
                                                            const percent = Math.round((quizScore / filteredQuizQuestions.length) * 100);
                                                            const dayKey = `w2d${selectedDay}`;
                                                            if (percent > (quizScores[dayKey] || 0)) {
                                                                setQuizScores(prev => ({ ...prev, [dayKey]: percent }));
                                                            }
                                                        }
                                                    }}
                                                    className="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3.5 px-8 rounded-2xl transition text-xs uppercase tracking-wider"
                                                >
                                                    Lanjutkan
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {quizStep === 'result' && (
                                    <div className="bg-white border border-slate-200 rounded-3xl p-6 text-center space-y-6">
                                        <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto text-3xl">
                                            🎉
                                        </div>
                                        <h2 className="text-2xl font-black text-slate-900">Kuis Selesai!</h2>
                                        <div className="bg-slate-50 rounded-2xl p-6 max-w-sm mx-auto">
                                            <span className="text-xs text-slate-400 font-bold uppercase">Skor Akhir</span>
                                            <h1 className="text-5xl font-black text-indigo-600 mt-1">
                                                {Math.round((quizScore / filteredQuizQuestions.length) * 100)}%
                                            </h1>
                                        </div>
                                        <button 
                                            onClick={() => { setQuizStep('active'); setCurrentQuizIndex(0); setSelectedOption(null); setHasSubmittedAnswer(false); setQuizScore(0); }}
                                            className="bg-slate-900 text-white font-extrabold py-3.5 px-8 rounded-2xl text-xs uppercase"
                                        >
                                            Ulangi Kuis
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="mt-20 border-t border-slate-200 py-8 text-center text-slate-400 text-xs">
                        <p>© Nihongo Soumatome N3 Kanji Explorer • Week 2</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
