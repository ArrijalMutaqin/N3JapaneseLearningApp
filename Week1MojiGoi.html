        function FlashcardMode({ categories, dayKey, memorizedVocab, onToggleMemorized }) {
            const allItems = categories.flatMap(cat =>

            const activeItems = filterMemorized 
                ? allItems.filter(item => !memorizedVocab[`${dayKey}_${item.id}`])
                : allItems;

            useEffect(() => {
                setIsFlipped(false);
                if (currentIndex >= activeItems.length && activeItems.length > 0) {
                    setCurrentIndex(0);
                }
            }, [currentIndex, filterMemorized, activeItems.length]);

            if (activeItems.length === 0) {
                return (
                    <div className="bg-purple-50/50 border border-purple-200 rounded-3xl p-8 text-center space-y-4 my-6 font-sans">
                        <div className="w-16 h-16 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center text-2xl mx-auto shadow-inner">

                        >
                            Lihat Semua Flashcard
                        </button>
                    </div>
                );
            }

            const currentItem = activeItems[currentIndex] || activeItems[0];
            const currentItemKey = `${dayKey}_${currentItem.id}`;
            const isMemorized = memorizedVocab[currentItemKey] || false;

            const handleNext = () => {
                setIsFlipped(false);
                setCurrentIndex((prev) => (prev + 1) % activeItems.length);

                        </button>
                    </div>

                            {/* Front Side */}

                                    <i className="fa-solid fa-rotate"></i>
                                    <span>Lihat Arti / Terjemahan</span>
                                </div>
                            </div>

                            {/* Back Side */}

                            onClick={() => onToggleMemorized(currentItemKey)}
                            className={`px-5 py-3 font-extrabold text-sm rounded-2xl transition-all shadow-sm flex items-center gap-2 ${
                                isMemorized

                        >
                            <span>次</span>
                            <i className="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>

                try {
                    const saved = localStorage.getItem('ns_mojigoi_userAnswers');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) { return {}; }
            });

            const [submittedDays, setSubmittedDays] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_mojigoi_submittedDays');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) { return {}; }
            });

            const [scores, setScores] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_mojigoi_scores');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) { return {}; }
            });

            const [showResetConfirm, setShowResetConfirm] = useState(false);

            useEffect(() => {
                localStorage.setItem('ns_mojigoi_showIndoTrans', showIndoTrans.toString());
            }, [showIndoTrans]);

            useEffect(() => {
                localStorage.setItem('ns_mojigoi_memorized', JSON.stringify(memorizedVocab));
            }, [memorizedVocab]);

            useEffect(() => {
                localStorage.setItem('ns_mojigoi_userAnswers', JSON.stringify(userAnswers));
            }, [userAnswers]);

            useEffect(() => {
                localStorage.setItem('ns_mojigoi_submittedDays', JSON.stringify(submittedDays));
            }, [submittedDays]);

            useEffect(() => {
                localStorage.setItem('ns_mojigoi_scores', JSON.stringify(scores));
            }, [scores]);

            const handleResetAllProgress = () => {
                localStorage.clear();
                setUserAnswers({});
                setSubmittedDays({});
                setScores({});
                setMemorizedVocab({});
                setShowResetConfirm(false);
            };

            const handleToggleMemorized = (itemKey) => {
                setMemorizedVocab(prev => ({
                    ...prev,
                    [itemKey]: !prev[itemKey]
                }));
            };

            const handleSelectVal = (dayKey, questionId, val) => {
                if (submittedDays[dayKey]) return;
                setUserAnswers(prev => ({ ...prev, [`${dayKey}_${questionId}`]: val }));
            };

            const calculateResults = (dayKey) => {
                const lesson = LESSON_DATA[dayKey];
                let correctCount = 0;

                lesson.practice1.forEach(q => {
                    if (userAnswers[`${dayKey}_${q.id}`] === q.ans) correctCount++;
                });

                lesson.practice2.forEach(q => {
                    if (userAnswers[`${dayKey}_${q.id}`] === q.ans) correctCount++;
                });

                setScores(prev => ({ ...prev, [dayKey]: correctCount }));
                setSubmittedDays(prev => ({ ...prev, [dayKey]: true }));
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const resetQuiz = (dayKey) => {
                setSubmittedDays(prev => ({ ...prev, [dayKey]: false }));
                setScores(prev => ({ ...prev, [dayKey]: 0 }));
                setUserAnswers(prev => {
                    const updated = { ...prev };
                    Object.keys(updated).forEach(key => {
                        if (key.startsWith(`${dayKey}_`)) delete updated[key];
                    });
                    return updated;
                });
            };

            const renderViewContent = () => {
                if (currentView === 'landing') {
                    const availableDayKeys = Object.keys(LESSON_DATA);
                    const totalLessons = availableDayKeys.length; 
                    const completedCount = availableDayKeys.filter(k => submittedDays[k]).length;
                    const completionPercentage = Math.round((completedCount / totalLessons) * 100);

                    // Menghitung statistik total hafalan kosakata
                    let allVocabCount = 0;
                    let memorizedCount = 0;
                    availableDayKeys.forEach(dKey => {
                        LESSON_DATA[dKey].categories.forEach(cat => {
                            cat.items.forEach(item => {
                                allVocabCount++;
                                if (memorizedVocab[`${dKey}_${item.id}`]) {
                                    memorizedCount++;
                                }
                            });
                        });
                    });
                    const memorizedPercentage = allVocabCount > 0 ? Math.round((memorizedCount / allVocabCount) * 100) : 0;

                    return (
                        <div className="min-h-screen bg-slate-50 font-sans">
                            {showResetConfirm && (
                                <div className="fixed inset-0 bg-slate-950/65 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                                    <div className="bg-white rounded-3xl border border-slate-200 shadow-xl max-w-sm w-full p-6 text-center space-y-4">
                                        <div className="w-14 h-14 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto shadow-inner text-xl">
                                            <i className="fa-solid fa-triangle-exclamation"></i>
                                        </div>
                                        <div className="space-y-1">
                                            <h3 className="text-base font-black text-slate-900">Mulai Ulang Progres?</h3>
                                            <p className="text-xs text-slate-500 leading-relaxed">Tindakan ini akan menghapus semua jawaban dan status hafalan kosakata Anda secara permanen dari browser.</p>
                                        </div>
                                        <div className="flex gap-2 pt-2">
                                            <button onClick={() => setShowResetConfirm(false)} className="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-xs rounded-xl transition-all">Batalkan</button>
                                            <button onClick={handleResetAllProgress} className="flex-1 py-2.5 bg-rose-500 hover:bg-rose-600 text-white font-bold text-xs rounded-xl transition-all">Ya, Reset</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <header className="bg-slate-900 text-white shadow-md relative overflow-hidden">
                                <div className="max-w-4xl mx-auto px-6 pt-4 flex justify-between items-center text-xs">
                                    <a href="DashboardMojiGoi.html" className="flex items-center gap-2 hover:text-white transition-colors bg-slate-800 text-slate-300 px-3.5 py-2 rounded-full border border-slate-700/50 hover:bg-slate-700 font-medium">
                                        <i className="fa-solid fa-house text-purple-400"></i>
                                        <span>Kembali</span>
                                    </a>
                                    <button onClick={() => setShowResetConfirm(true)} className="flex items-center gap-2 hover:text-white transition-colors bg-rose-950/40 text-rose-300 px-3.5 py-2 rounded-full border border-rose-900/50 hover:bg-rose-900/60 font-medium">
                                        <i className="fa-solid fa-trash-can text-rose-400"></i>
                                        <span>Reset Progres</span>
                                    </button>
                                </div>
                                <div className="max-w-4xl mx-auto px-6 py-12 text-center relative z-10 flex flex-col items-center">
                                    <span className="bg-purple-500/20 text-purple-400 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wider mb-3 inline-block border border-purple-500/20">
                                        日本語総まとめ N3 : 文字・語彙
                                    </span>
                                    <h1 className="text-3xl md:text-4xl font-black tracking-tight mt-1">
                                        第1週 (Week 1)
                                    </h1>
                                    <p className="text-slate-400 font-medium mt-2 text-sm md:text-base">
                                        家事をしましょう (1日目〜7日目)
                                    </p>
                                </div>
                            </header>

                            <main className="max-w-4xl mx-auto px-4 md:px-6 py-10">
                                <div className="mb-8 bg-white border border-slate-200 rounded-3xl p-6 shadow-sm">
                                    <h3 className="text-sm font-extrabold text-slate-400 uppercase tracking-widest mb-4">Statistik Progres Week 1</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="flex items-center justify-between gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center text-lg font-black border border-purple-100">
                                                    {memorizedPercentage}%
                                                </div>
                                                <div>
                                                    <h4 className="text-sm font-bold text-slate-800">Hafalan Kosakata</h4>
                                                    <p className="text-slate-500 text-[11px]">
                                                        Menghafal <span className="text-purple-600 font-bold">{memorizedCount}</span> dari <span className="font-bold">{allVocabCount}</span> kata.
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="w-20 bg-slate-200 h-2 rounded-full overflow-hidden">
                                                <div className="bg-purple-500 h-full transition-all duration-500" style={{ width: `${memorizedPercentage}%` }}></div>
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center text-lg font-black border border-purple-100">
                                                    {completionPercentage}%
                                                </div>
                                                <div>
                                                    <h4 className="text-sm font-bold text-slate-800">Uji Latihan Soal</h4>
                                                    <p className="text-slate-500 text-[11px]">
                                                        Menyelesaikan <span className="text-purple-600 font-bold">{completedCount}</span> dari <span className="font-bold">{totalLessons}</span> bab.
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="w-20 bg-slate-200 h-2 rounded-full overflow-hidden">
                                                <div className="bg-purple-500 h-full transition-all duration-500" style={{ width: `${completionPercentage}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden p-6">
                                    <h2 className="text-xl font-bold text-slate-800 border-b border-slate-100 pb-3 mb-4">
                                         Pemilihan Hari (Week 1)
                                    </h2>
                                    <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-3">
                                        {[1, 2, 3, 4, 5, 6, 7].map((dayNum) => {
                                            const dayKey = `w1d${dayNum}`;
                                            const isAvailable = Boolean(LESSON_DATA[dayKey]);
                                            const isCompleted = submittedDays[dayKey] || false;
                                            const score = scores[dayKey] || 0;
                                            const totalPoints = LESSON_DATA[dayKey] ? (LESSON_DATA[dayKey].practice1.length + LESSON_DATA[dayKey].practice2.length) : 0;

                                            return (
                                                <button
                                                    key={dayNum}
                                                    disabled={!isAvailable}
                                                    onClick={() => isAvailable && setCurrentView(dayKey)}
                                                    className={`py-3 px-2 rounded-2xl border text-center transition-all relative flex flex-col justify-between min-h-[90px] ${
                                                        !isAvailable 
                                                            ? 'bg-slate-50 border-slate-200 text-slate-400 opacity-60 cursor-not-allowed'
                                                            : isCompleted
                                                            ? 'bg-purple-50 border-purple-300 text-purple-800 hover:bg-purple-100/80 hover:shadow-sm'
                                                            : 'bg-purple-50/40 border-purple-400 text-purple-800 hover:bg-purple-100/80 hover:shadow-sm'
                                                    }`}
                                                >
                                                    {isCompleted && (
                                                        <span className="absolute -top-1 -right-1 bg-purple-500 text-white text-[8px] w-4.5 h-4.5 rounded-full flex items-center justify-center shadow-sm z-10">
                                                            <i className="fa-solid fa-check"></i>
                                                        </span>
                                                    )}
                                                    <div>
                                                        <div className="text-[10px] text-slate-400 font-medium leading-none mb-1">
                                                            {dayNum === 7 ? '実戦' : `${dayNum}日目`}
                                                        </div>
                                                        <div className="text-sm font-extrabold leading-none mb-1">
                                                            {dayNum === 7 ? '7日目' : `${dayNum}日`}
                                                        </div>
                                                    </div>

                                                    <div className="text-[10px] mt-2 space-y-0.5 border-t border-dashed border-slate-200 pt-1.5 w-full">
                                                        {isAvailable ? (
                                                            <div className="text-purple-700 font-bold leading-none">
                                                                <i className="fa-solid fa-star text-[8px] mr-1"></i>
                                                                {isCompleted ? `${score}/${totalPoints}` : 'Mulai'}
                                                            </div>
                                                        ) : (
                                                            <div className="text-slate-400 font-medium leading-none">
                                                                Segera
                                                            </div>
                                                        )}
                                                    </div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </main>

                            <footer className="mt-12 border-t border-slate-200 py-8 text-center text-slate-400 text-xs">
                                <p>© Nihongo Soumatome N3 MojiGoi.</p>
                            </footer>
                        </div>
                    );
                }

                const currentLesson = LESSON_DATA[currentView];
                if (currentLesson) {
                    const totalPoints = currentLesson.practice1.length + currentLesson.practice2.length;
                    const isSubmitted = submittedDays[currentView] || false;
                    const score = scores[currentView] || 0;

                    return (
                        <div className="min-h-screen pb-20 bg-slate-50">
                            <Header title={currentLesson.title} onBack={() => setCurrentView('landing')} />

                            <main className="max-w-4xl mx-auto px-4 md:px-6 mt-8 animate-fade-in">
                                {isSubmitted && (
                                    <QuizResultCard score={score} total={totalPoints} onReset={() => resetQuiz(currentView)} />
                                )}

                                <section className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 md:p-8 mb-8">
                                    <div className="border-b-2 border-slate-900 pb-4 mb-6 flex items-center justify-between flex-wrap gap-3">
                                        <div>
                                            <span className="text-xs font-bold uppercase tracking-wider text-slate-700 bg-slate-100 px-3 py-1 rounded-full border border-slate-200 font-sans">
                                                {currentLesson.badge}
                                            </span>
                                            <h2 className="text-2xl font-extrabold text-slate-800 mt-2 japanese-text">
                                                {currentLesson.vocabTitle}
                                            </h2>
                                        </div>

                                        {/* Mode View Switch (Daftar vs Flashcard) */}
                                        <div className="inline-flex p-1 bg-slate-100 rounded-2xl border border-slate-200 font-sans">
                                            <button 
                                                onClick={() => setVocabMode('list')}
                                                className={`px-3.5 py-1.5 rounded-xl text-xs font-bold transition-all flex items-center gap-1.5 ${
                                                    vocabMode === 'list' 
                                                        ? 'bg-white text-slate-900 shadow-sm' 
                                                        : 'text-slate-500 hover:text-slate-800'
                                                }`}
                                            >
                                                <i className="fa-solid fa-list-ul"></i>
                                                <span>Daftar</span>
                                            </button>
                                            <button 
                                                onClick={() => setVocabMode('flashcard')}
                                                className={`px-3.5 py-1.5 rounded-xl text-xs font-bold transition-all flex items-center gap-1.5 ${
                                                    vocabMode === 'flashcard' 
                                                        ? 'bg-purple-600 text-white shadow-sm' 
                                                        : 'text-slate-500 hover:text-slate-800'
                                                }`}
                                            >
                                                <i className="fa-solid fa-clone"></i>
                                                <span>Flashcard</span>
                                            </button>
                                        </div>
                                    </div>

                                    {/* Percakapan Singkat */}
                                    <div className="bg-slate-50/80 border border-slate-200/80 rounded-2xl p-4 md:p-5 mb-8">
                                        <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 font-sans">会話 (Percakapan Singkat)</h4>
                                        <div className="space-y-3 japanese-text text-base md:text-lg">
                                            {currentLesson.dialogue.map((d, idx) => (
                                                <div key={idx} className="flex flex-col">
                                                    <div className="font-medium text-slate-800">
                                                        <span className="font-bold text-purple-600 mr-2 font-sans">{d.speaker}:</span>
                                                        {d.jp}
                                                    </div>
                                                    <div className="text-xs text-slate-500 font-sans ml-6 mt-0.5">
                                                        {d.trans}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Kosakata: Tampilan Flashcard atau Tampilan Daftar */}
                                    {vocabMode === 'flashcard' ? (
                                        <FlashcardMode 
                                            categories={currentLesson.categories} 
                                            dayKey={currentView}
                                            memorizedVocab={memorizedVocab}
                                            onToggleMemorized={handleToggleMemorized}
                                        />
                                    ) : (
                                        <div className="space-y-6">
                                            {currentLesson.categories.map((cat, idx) => (
                                                <VocabSection 
                                                    key={idx} 
                                                    categoryTitle={cat.categoryTitle} 
                                                    items={cat.items} 
                                                    dayKey={currentView}
                                                    memorizedVocab={memorizedVocab}
                                                    onToggleMemorized={handleToggleMemorized}
                                                />
                                            ))}
                                        </div>
                                    )}
                                </section>

                                <PracticePart1 
                                    dayKey={currentView}
                                    questions={currentLesson.practice1} 
                                    answers={userAnswers} 
                                    submitted={isSubmitted} 
                                    onSelect={(qId, val) => handleSelectVal(currentView, qId, val)} 
                                    showIndoTrans={showIndoTrans}
                                    setShowIndoTrans={setShowIndoTrans}
                                />

                                <PracticePart2 
                                    dayKey={currentView}
                                    questions={currentLesson.practice2} 
                                    answers={userAnswers} 
                                    submitted={isSubmitted} 
                                    onSelect={(qId, val) => handleSelectVal(currentView, qId, val)} 
                                    showIndoTrans={showIndoTrans}
                                />

                                <div className="flex flex-col sm:flex-row items-center justify-center gap-4 font-sans">
                                    {!isSubmitted ? (
                                        <button onClick={() => calculateResults(currentView)}
                                            className="w-full sm:w-auto px-10 py-4 bg-slate-900 hover:bg-slate-800 text-white text-base font-black rounded-2xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-paper-plane"></i>
                                            採点する (Nilai Latihan)
                                        </button>
                                    ) : (
                                        <button onClick={() => resetQuiz(currentView)}
                                            className="w-full sm:w-auto px-10 py-4 bg-slate-900 hover:bg-slate-800 text-white text-base font-black rounded-2xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-rotate-right"></i>
                                            もう一度解く (Coba Lagi)
                                        </button>
                                    )}
                                </div>
                            </main>

                            <footer className="mt-20 border-t border-slate-200 py-8 text-center text-slate-400 text-xs font-sans">
                                <p>© Nihongo Soumatome N3 MojiGoi.</p>
                            </footer>
                        </div>
                    );
                }

                return null;
            };

            return (
                <div className="min-h-screen bg-slate-50 relative">
                    {renderViewContent()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
