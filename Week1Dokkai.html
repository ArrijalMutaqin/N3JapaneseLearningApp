        // Component JpText Presisi: Mengisolasi Kanji persis di depan kurung [...]
        function JpText({ text }) {
            if (!text) return null;
            if (typeof text !== 'string') return text;
            
            const nodes = [];
            let lastIndex = 0;
            const bracketRegex = /\[([^\]]+)\]/g;
            let match;

            while ((match = bracketRegex.exec(text)) !== null) {
                const bracketIndex = match.index;
                const furigana = match[1];
                const textBefore = text.slice(lastIndex, bracketIndex);

                // Cari karakter Kanji / Angka persis di ujung belakang textBefore
                const kanjiMatch = textBefore.match(/([\u4e00-\u9faf\u3005\u3400-\u4dbf0-9０-９a-zA-Z]+)$/);

                if (kanjiMatch) {
                    const kanji = kanjiMatch[1];
                    const plainText = textBefore.slice(0, textBefore.length - kanji.length);

                    if (plainText) {
                        nodes.push(<span key={`plain_${lastIndex}`}>{plainText}</span>);
                    }
                    nodes.push(
                        <ruby key={`ruby_${bracketIndex}`}>
                            {kanji}
                            <rt>{furigana}</rt>
                        </ruby>
                    );
                } else {
                    nodes.push(<span key={`plain_${lastIndex}`}>{textBefore}</span>);
                    nodes.push(
                        <ruby key={`ruby_${bracketIndex}`}>
                            <rt>{furigana}</rt>
                        </ruby>
                    );
                }

                lastIndex = bracketRegex.lastIndex;
            }

            if (lastIndex < text.length) {
                nodes.push(<span key={`plain_end`}>{text.slice(lastIndex)}</span>);
            }

            return <>{nodes}</>;
        }

                    return saved === 'true';
                } catch (e) {
                    return false;
                }
            });

            // Master states loaded from localStorage
            const [userAnswers, setUserAnswers] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_dokkai_userAnswers');
                    return saved ? JSON.parse(saved) : {};

                    return {};
                }
            });
            const [submittedDays, setSubmittedDays] = useState(() => {
                try {

                    return saved ? JSON.parse(saved) : {};
                } catch (e) {
                    return {};
                }
            });
            const [scores, setScores] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_dokkai_scores');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) {
                    return {};
                }
            });

            // Vocabulary Understanding State
            const [vocabUnderstanding, setVocabUnderstanding] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_dokkai_vocabUnderstanding');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) {
                    return {};
                }
            });

            const [showResetConfirm, setShowResetConfirm] = useState(false);

            // Save state effects
            useEffect(() => {
                localStorage.setItem('ns_dokkai_showIndoTrans', showIndoTrans.toString());
            }, [showIndoTrans]);

            useEffect(() => {
                localStorage.setItem('ns_dokkai_userAnswers', JSON.stringify(userAnswers));
            }, [userAnswers]);

            useEffect(() => {
                localStorage.setItem('ns_dokkai_submittedDays', JSON.stringify(submittedDays));
            }, [submittedDays]);

            useEffect(() => {
                localStorage.setItem('ns_dokkai_scores', JSON.stringify(scores));
            }, [scores]);

            useEffect(() => {
                localStorage.setItem('ns_dokkai_vocabUnderstanding', JSON.stringify(vocabUnderstanding));
            }, [vocabUnderstanding]);

            const handleResetAllProgress = () => {
                localStorage.clear();
                setUserAnswers({});
                setSubmittedDays({});
                setScores({});
                setVocabUnderstanding({});
                setShowResetConfirm(false);
            };

            const handleToggleUnderstood = (dayKey, vocabKey) => {
                setVocabUnderstanding(prev => ({
                    ...prev,
                    [`${dayKey}_${vocabKey}`]: !prev[`${dayKey}_${vocabKey}`]
                }));
            };

            // Toggle checkbox for practiceStatements
            const handleToggleStatementCheck = (dayKey, stmtId) => {
                if (submittedDays[dayKey]) return;
                const answerKey = `${dayKey}_${stmtId}`;
                setUserAnswers(prev => ({
                    ...prev,
                    [answerKey]: !prev[answerKey]
                }));
            };

                if (submittedDays[dayKey]) return;
                setUserAnswers(prev => ({
                    ...prev,
                    [`${dayKey}_${questionId}`]: val
                }));
            };

            const calculateResults = (dayKey) => {
                const lesson = DOKKAI_LESSON_DATA[dayKey];
                let correctCount = 0;

                lesson.practiceStatements.forEach(stmt => {
                    const isChecked = !!userAnswers[`${dayKey}_${stmt.id}`];
                    if (isChecked === stmt.isCorrect) {
                        correctCount++;
                    }
                });

                lesson.mondaiQuestions.forEach(mq => {
                    if (userAnswers[`${dayKey}_${mq.id}`] === mq.ans) {
                        correctCount++;
                    }
                });

                setScores(prev => ({ ...prev, [dayKey]: correctCount }));
                setSubmittedDays(prev => ({ ...prev, [dayKey]: true }));
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const resetQuiz = (dayKey) => {
                setSubmittedDays(prev => ({ ...prev, [dayKey]: false }));
                setScores(prev => ({ ...prev, [dayKey]: 0 }));
                setUserAnswers(prev => {
                    const updated = { ...prev };
                    Object.keys(updated).forEach(key => {
                        if (key.startsWith(`${dayKey}_`)) {

                        }
                    });
                    return updated;
                });

                const dayKey = `w${week}d${day}`;

                    const totalLessons = 12;

                            )}

                            <header className="bg-slate-900 text-white shadow-md relative overflow-hidden">
                                <div className="max-w-4xl mx-auto px-6 pt-4 flex justify-between items-center text-xs">
                                    <a href="DashboardDokkai.html" className="flex items-center gap-2 hover:text-white transition-colors bg-slate-800 text-slate-300 px-3.5 py-2 rounded-full border border-slate-700/50 hover:bg-slate-700 font-medium">
                                        <i className="fa-solid fa-house text-amber-400"></i>
                                        <span>Kembali</span>
                                    </a>
                                    <button onClick={() => setShowResetConfirm(true)} className="flex items-center gap-2 hover:text-white transition-colors bg-rose-950/40 text-rose-300 px-3.5 py-2 rounded-full border border-rose-900/50 hover:bg-rose-900/60 font-medium">
                                        <i className="fa-solid fa-trash-can text-rose-400"></i>
                                        <span>Reset Progres</span>
                                    </button>
                                </div>
                                <div className="max-w-4xl mx-auto px-6 py-12 text-center relative z-10 flex flex-col items-center">
                                    <span className="bg-amber-500/20 text-amber-400 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wider mb-3 inline-block border border-amber-500/20">
                                        日本語総まとめ N3 : 読解
                                    </span>
                                    <h1 className="text-3xl md:text-4xl font-black tracking-tight mt-1">
                                        読解 (Reading Comprehension)
                                    </h1>
                                    <p className="text-slate-400 font-medium mt-2 text-sm md:text-base">
                                        第1週から第6週までの読解学習ダッシュボード
                                    </p>
                                </div>
                            </header>

                            <main className="max-w-4xl mx-auto px-4 md:px-6 py-10">
                                <div className="mb-8 bg-white border border-slate-200 rounded-3xl p-6 shadow-sm">
                                    <h3 className="text-sm font-extrabold text-slate-400 uppercase tracking-widest mb-4">Statistik Progres Belajar Dokkai</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="flex items-center justify-between gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center text-lg font-black border border-amber-100">
                                                    {completionPercentage}%
                                                </div>
                                                <div>
                                                    <h4 className="text-sm font-bold text-slate-800">Latihan Dokkai</h4>
                                                    <p className="text-slate-500 text-[11px]">
                                                        Selesai <span className="text-amber-600 font-bold">{completedCount}</span> dari <span className="font-bold">{totalLessons}</span> bab.
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="w-24 bg-slate-200 h-2 rounded-full overflow-hidden">
                                                <div className="bg-amber-500 h-full transition-all duration-500" style={{ width: `${completionPercentage}%` }}></div>
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center text-lg font-black border border-amber-100">
                                                    {vocabProgressPercentage}%
                                                </div>
                                                <div>
                                                    <h4 className="text-sm font-bold text-slate-800">Kosakata & Kata Kunci</h4>
                                                    <p className="text-slate-500 text-[11px]">
                                                        Paham <span className="text-amber-600 font-bold">{understoodVocabCount}</span> dari <span className="font-bold">{totalVocabCount}</span> kata.
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="w-24 bg-slate-200 h-2 rounded-full overflow-hidden">
                                                <div className="bg-amber-500 h-full transition-all duration-500" style={{ width: `${vocabProgressPercentage}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {[1, 2, 3, 4, 5, 6].map((weekNum) => (
                                        <div key={weekNum} className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden p-6 hover:shadow-md transition-shadow">
                                            <div className="border-b-2 border-slate-100 pb-3 mb-4 flex items-center justify-between">
                                                <h2 className="text-xl font-bold text-slate-800">
                                                    第{weekNum}週
                                                </h2>
                                                {weekNum === 1 && (
                                                    <span className="bg-amber-50 text-amber-700 text-[10px] font-bold px-2.5 py-0.5 rounded-full border border-amber-200">
                                                        学習可能
                                                    </span>
                                                )}
                                            </div>
                                            <div className="grid grid-cols-4 gap-3">
                                                {[1, 2, 3, 4, 5, 6, 7].map((dayNum) => {
                                                    const dayKey = `w${weekNum}d${dayNum}`;
                                                    const isAvailable = (weekNum === 1 && (dayNum === 1 || dayNum === 2 || dayNum === 3));
                                                    const isCompleted = submittedDays[dayKey] || false;

                                                    const lesson = DOKKAI_LESSON_DATA[dayKey];
                                                    const totalPoints = lesson ? (lesson.practiceStatements.length + lesson.mondaiQuestions.length) : 0;
                                                    const score = scores[dayKey] || 0;

                                                    return (
                                                        <button
                                                            key={dayNum}
                                                            onClick={() => handleDaySelect(weekNum, dayNum)}
                                                            className={`py-2 px-1.5 rounded-xl border text-center transition-all relative flex flex-col justify-between min-h-[82px] ${
                                                                isAvailable
                                                                    ? isCompleted
                                                                        ? 'bg-amber-50 border-amber-300 text-amber-800 hover:bg-amber-100/80 hover:shadow-sm scale-100 active:scale-95'
                                                                        : 'bg-amber-50/40 border-amber-400 text-amber-800 hover:bg-amber-100/80 hover:shadow-sm scale-100 active:scale-95'
                                                                    : 'bg-slate-50 border-slate-200 text-slate-400 hover:bg-slate-100 pointer-events-none opacity-55'
                                                            }`}
                                                        >
                                                            {isCompleted && (
                                                                <span className="absolute -top-1 -right-1 bg-amber-500 text-white text-[8px] w-4.5 h-4.5 rounded-full flex items-center justify-center shadow-sm z-10">
                                                                    <i className="fa-solid fa-check"></i>
                                                                </span>
                                                            )}
                                                            <div>
                                                                <div className="text-[9px] text-slate-400 font-medium leading-none mb-0.5">
                                                                    {dayNum === 7 ? '実戦' : `${dayNum}日目`}
                                                                </div>
                                                                <div className="text-xs font-extrabold leading-none mb-1">
                                                                    {dayNum === 7 ? '7日目' : `${dayNum}日`}
                                                                </div>
                                                            </div>

                                                            {isAvailable && (
                                                                <div className="text-[9px] mt-1 space-y-0.5 border-t border-dashed border-slate-200 pt-1 w-full">
                                                                    {isCompleted ? (
                                                                        <div className="text-amber-700 font-bold leading-none" title="Skor latihan">
                                                                            <i className="fa-solid fa-star text-[8px] mr-0.5"></i>
                                                                            {score}/{totalPoints}
                                                                        </div>
                                                                    ) : (
                                                                        <div className="text-slate-500 font-bold leading-none">
                                                                            <i className="fa-solid fa-book-open text-[8px] mr-0.5 text-amber-500"></i>
                                                                            Mulai
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            )}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </main>

                            <footer className="mt-12 border-t border-slate-200 py-8 text-center text-slate-400 text-xs">
                                <p>© Nihongo Soumatome N3 Dokkai.</p>
                            </footer>
                        </div>
                    );
                }

                if (currentView === 'coming_soon') {
                    return (
                        <div className="min-h-screen bg-slate-50 flex flex-col justify-between font-sans">
                            <header className="bg-slate-900 text-white shadow-md">
                                <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <button 
                                            onClick={() => setCurrentView('landing')} 
                                            className="p-2 hover:bg-slate-800 rounded-lg transition-colors text-slate-300 hover:text-white"
                                        >
                                            <i className="fa-solid fa-arrow-left"></i>
                                        </button>
                                        <span className="font-bold text-sm">戻る</span>
                                    </div>
                                    <a href="index.html" className="p-2 hover:bg-slate-800 rounded-lg transition-colors text-slate-300 hover:text-white flex items-center gap-2 text-sm" title="Kembali ke Portal">
                                        <i className="fa-solid fa-house"></i>
                                        <span className="hidden sm:inline">Portal</span>
                                    </a>
                                </div>
                            </header>

                            <main className="max-w-md mx-auto px-6 py-20 text-center flex-1 flex flex-col items-center justify-center animate-fade-in">
                                <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 text-3xl mb-6">
                                    <i className="fa-solid fa-lock"></i>
                                </div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">
                                    第{comingSoonDay.week}週 {comingSoonDay.day}日目
                                </h2>
                                <p className="text-slate-500 font-medium mb-8 text-sm">
                                    コンテンツ準備中 (Dokkai lesson coming soon)
                                </p>
                                <button
                                    onClick={() => setCurrentView('landing')}
                                    className="px-8 py-3 bg-slate-950 hover:bg-slate-800 text-white font-bold rounded-2xl shadow-md transition-transform active:scale-95 text-sm"
                                >
                                    ダッシュボードに戻る
                                </button>
                            </main>

                            <footer className="border-t border-slate-200 py-6 text-center text-slate-400 text-xs">
                                <p>© Nihongo Soumatome N3 Dokkai.</p>
                            </footer>
                        </div>
                    );
                }

                const currentLesson = DOKKAI_LESSON_DATA[currentView];
                if (currentLesson) {
                    const totalPoints = currentLesson.practiceStatements.length + currentLesson.mondaiQuestions.length;
                    const isSubmitted = submittedDays[currentView] || false;
                    const score = scores[currentView] || 0;

                    return (
                        <div className="min-h-screen pb-20 bg-slate-50">
                            <DokkaiHeader title={currentLesson.title} onBack={() => setCurrentView('landing')} />

                            <main className="max-w-4xl mx-auto px-4 md:px-6 mt-8 animate-fade-in">
                                {isSubmitted && (
                                    <QuizResultCard score={score} total={totalPoints} onReset={() => resetQuiz(currentView)} />
                                )}

                                {/* Header Card for Day Title */}
                                <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 md:p-8 mb-8">
                                    <span className="text-xs font-bold uppercase tracking-wider text-slate-700 bg-slate-100 px-3 py-1 rounded-full border border-slate-200 font-sans">
                                        {currentLesson.badge}
                                    </span>
                                    <h2 className="text-2xl font-extrabold text-slate-900 mt-3 japanese-text">
                                        {currentLesson.readingTitle}
                                    </h2>
                                    <p className="text-sm text-slate-500 font-medium mt-1 font-sans">
                                        {currentLesson.readingSubtitle}
                                    </p>
                                </div>

                                {/* Vocabulary List Component */}
                                <VocabExplanationList 
                                    dayKey={currentView}
                                    vocabList={currentLesson.vocabList}
                                    grammarNote={currentLesson.grammarNote}
                                    understandingState={vocabUnderstanding}
                                    onToggleUnderstood={handleToggleUnderstood}
                                />

                                {/* Dialogue Practice Component with Checkbox Statements */}
                                <PracticeDialogueSection 
                                    dayKey={currentView}
                                    practiceDialogue={currentLesson.practiceDialogue}
                                    practiceStatements={currentLesson.practiceStatements}
                                    userAnswers={userAnswers}
                                    submitted={isSubmitted}
                                    onToggleCheck={(stmtId) => handleToggleStatementCheck(currentView, stmtId)}
                                    showIndoTrans={showIndoTrans}
                                    setShowIndoTrans={setShowIndoTrans}
                                />

                                {/* Main Reading Notice / Poster Component */}
                                <NoticeMondaiSection 
                                    dayKey={currentView}
                                    noticeData={currentLesson.noticeData}
                                    mondaiQuestions={currentLesson.mondaiQuestions}
                                    userAnswers={userAnswers}
                                    submitted={isSubmitted}
                                    onSelect={(qId, val) => handleSelectMondaiVal(currentView, qId, val)}
                                    showIndoTrans={showIndoTrans}
                                />

                                <div className="flex flex-col sm:flex-row items-center justify-center gap-4 font-sans">
                                    {!isSubmitted ? (
                                        <button onClick={() => calculateResults(currentView)}
                                            className="w-full sm:w-auto px-10 py-4 bg-slate-900 hover:bg-slate-800 text-white text-base font-black rounded-2xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-paper-plane"></i>
                                            採点する (Nilai Latihan Dokkai)
                                        </button>
                                    ) : (
                                        <button onClick={() => resetQuiz(currentView)}
                                            className="w-full sm:w-auto px-10 py-4 bg-slate-900 hover:bg-slate-800 text-white text-base font-black rounded-2xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-rotate-right"></i>
                                            もう一度解く (Coba Lagi)
                                        </button>
                                    )}
                                </div>
                            </main>

                            <footer className="mt-20 border-t border-slate-200 py-8 text-center text-slate-400 text-xs font-sans">
                                <p>© Nihongo Soumatome N3 Dokkai.</p>
                            </footer>
                        </div>
                    );
                }

                return null;
            };

            return (
                <div className="min-h-screen bg-slate-50 relative">
                    {renderViewContent()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
