                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                utterance.rate = 0.85; // slightly slower for better learner comprehension
                
                const voices = window.speechSynthesis.getVoices();
                const jps = voices.filter(v => v.lang.includes('ja-JP'));
                if (jps.length > 0) {
                    utterance.voice = jps[0];
                }
                window.speechSynthesis.speak(utterance);
            } else {
                console.warn("Speech Synthesis tidak didukung oleh browser ini.");
            }
        };

            const [selectedDay, setSelectedDay] = useState(1);

            const [quizScores, setQuizScores] = useState({});

            // Custom non-blocking modal states

            const [showImportArea, setShowImportArea] = useState(false);
            const [statusNotification, setStatusNotification] = useState(null);

            // Dictionary/vocabulary grid states
            const [searchQuery, setSearchQuery] = useState("");

            // Active Quiz states
            const [quizStep, setQuizStep] = useState('start'); // 'start' | 'active' | 'result'
            const [currentQuizIndex, setCurrentQuizIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [hasSubmittedAnswer, setHasSubmittedAnswer] = useState(false);
            const [quizScore, setQuizScore] = useState(0);
            const [incorrectAnswers, setIncorrectAnswers] = useState([]);

            // Persistence via localStorage for learned state of Kanji cards & quiz scores
            useEffect(() => {
                const storedLearned = localStorage.getItem('soumatome_n3_kanji_learned');
                if (storedLearned) {
                    try {
                        setLearnedStatus(JSON.parse(storedLearned));
                    } catch (e) {
                        console.error("Error parsing learned status", e);
                    }

                const storedScores = localStorage.getItem('soumatome_n3_kanji_scores');
                if (storedScores) {
                    try {
                        setQuizScores(JSON.parse(storedScores));
                    } catch (e) {
                        console.error("Error parsing quiz scores", e);
                    }
                }
            }, []);

            const handleToggleLearned = (kanjiId) => {
                const updated = {
                    ...learnedStatus,
                    [kanjiId]: !learnedStatus[kanjiId]

                setLearnedStatus(updated);
                localStorage.setItem('soumatome_n3_kanji_learned', JSON.stringify(updated));
            };

            // Export progress data to JSON file
            const handleExportProgress = () => {
                try {
                    const progressData = {
                        learnedStatus,
                        quizScores
                    };
                    const dataStr = JSON.stringify(progressData, null, 2);
                    const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                    
                    const linkElement = document.createElement('a');
                    linkElement.setAttribute('href', dataUri);
                    linkElement.setAttribute('download', 'soumatome_n3_kanji_progress.json');
                    linkElement.click();
                    
                    triggerNotification("Progress belajar berhasil diekspor ke file JSON!", "success");
                } catch (e) {
                    triggerNotification("Gagal mengekspor data progress.", "error");
                }

            const handleImportProgress = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.readAsText(file, "UTF-8");
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed.learnedStatus || parsed.quizScores) {
                            if (parsed.learnedStatus) {
                                setLearnedStatus(parsed.learnedStatus);
                                localStorage.setItem('soumatome_n3_kanji_learned', JSON.stringify(parsed.learnedStatus));
                            }

                                setQuizScores(parsed.quizScores);
                                localStorage.setItem('soumatome_n3_kanji_scores', JSON.stringify(parsed.quizScores));
                            }
                            triggerNotification("Progress belajar berhasil diimpor!", "success");
                            setShowImportArea(false);
                        } else {
                            triggerNotification("File backup tidak valid.", "error");
                        }

                        triggerNotification("Gagal membaca atau mem-parsing file backup.", "error");
                    }

                                                            : 'Terus berlatih untuk menanamkan ingatan visual yang kuat.'}
                                                    </p>
                                                </div>

                                                {/* Final score calculation card */}
                                                <div className="bg-slate-50 rounded-2xl p-6 max-w-sm mx-auto border border-slate-100">
                                                    <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest block font-sans">Skor Total Anda</span>
                                                    <h1 className="text-5xl font-black text-indigo-600 mt-1 font-sans">
                                                        {Math.round((quizScore / filteredQuizQuestions.length) * 100)}%
                                                    </h1>
                                                    <p className="text-xs text-slate-500 mt-2 font-bold font-sans">
                                                        Benar {quizScore} dari {filteredQuizQuestions.length} Soal
                                                    </p>
                                                </div>

                                                {/* Incorrect Review List Display */}
                                                {incorrectAnswers.length > 0 && (
                                                    <div className="text-left space-y-3 pt-4">
                                                        <h3 className="text-sm font-bold text-slate-800 flex items-center gap-1.5">
                                                            <i className="fa-solid fa-circle-exclamation text-rose-500"></i>
                                                            <span>Evaluasi Kesalahan ({incorrectAnswers.length})</span>
                                                        </h3>
                                                        <div className="space-y-3 max-h-64 overflow-y-auto pr-1">
                                                            {incorrectAnswers.map((err, idx) => (
                                                                <div key={idx} className="p-4 border border-rose-100 rounded-xl bg-rose-50/30 space-y-2">
                                                                    <div className="text-xs font-bold text-slate-800 japanese-text" dangerouslySetInnerHTML={{ __html: err.question }}></div>
                                                                    <div className="text-[11px] text-slate-500 font-bold">
                                                                        <div className="text-rose-600">Jawaban Anda: {err.userChoice}</div>
                                                                        <div className="text-emerald-600">Seharusnya: {err.correctChoice}</div>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}

                                                {/* Action Buttons */}
                                                <div className="flex flex-col sm:flex-row gap-3 justify-center pt-2">
                                                    <button 
                                                        onClick={() => {
                                                            setQuizStep('active');
                                                            setCurrentQuizIndex(0);
                                                            setSelectedOption(null);
                                                            setHasSubmittedAnswer(false);
                                                            setQuizScore(0);
                                                            setIncorrectAnswers([]);
                                                        }}
                                                        className="bg-slate-900 hover:bg-slate-800 text-white font-extrabold py-3.5 px-6 rounded-2xl transition shadow text-xs uppercase tracking-wider font-sans active:scale-95"
                                                    >
                                                        Coba Lagi
                                                    </button>
                                                    <button 
                                                        onClick={() => setActiveTab('flashcards')}
                                                        className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-extrabold py-3.5 px-6 rounded-2xl transition text-xs uppercase tracking-wider font-sans active:scale-95"
                                                    >
                                                        Kembali Menghafal
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* App level footer */}
                    <footer className="mt-20 border-t border-slate-200 py-8 text-center text-slate-400 text-xs font-sans">
                        <p>© Nihongo Soumatome N3 Kanji Explorer • Kurikulum Mandiri JLPT</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
