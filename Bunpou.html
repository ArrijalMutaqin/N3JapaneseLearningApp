                                                </div>
                                            )}

                                            <div className="text-lg text-slate-800 font-bold mb-6 flex flex-wrap items-center gap-2 japanese-text">
                                                <span>{q.prefix}</span>
                                                {[0, 1, 2, 3].map((slotIdx) => {
                                                    const currentVal = currentSeq[slotIdx];
                                                    const correctVal = q.ans[slotIdx];
                                                    const isCorrect = currentVal === correctVal;
                                                    let borderStyle = "border-slate-300 text-slate-800";
                                                    
                                                    if (submitted) {
                                                        borderStyle = isCorrect ? "border-emerald-500 bg-emerald-50 text-emerald-700" : "border-rose-500 bg-rose-50 text-rose-700";
                                                    } else if (currentVal !== null && currentVal !== undefined) {
                                                        borderStyle = "border-slate-900 bg-slate-50 text-slate-900";
                                                    }
                                                    
                                                    return (
                                                        <div key={slotIdx} className="inline-block mx-1">
                                                            <select disabled={submitted} value={currentVal || ""}
                                                                onChange={(e) => onSelectSeq(q.id, slotIdx, e.target.value ? parseInt(e.target.value) : null)}
                                                                className={`w-14 h-11 text-center font-extrabold border-b-2 bg-transparent focus:outline-none transition-all rounded ${borderStyle}`}>
                                                                <option value="">＿</option>
                                                                <option value="1">1</option>
                                                                <option value="2">2</option>
                                                                <option value="3">3</option>
                                                                <option value="4">4</option>
                                                            </select>
                                                        </div>
                                                    );
                                                })}
                                                <span>{q.suffix}</span>
                                            </div>

                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-100 max-w-3xl font-sans">
                                                {q.options.map((opt, optIdx) => (
                                                    <div key={optIdx} className="text-sm font-medium text-slate-700 japanese-text">
                                                        <span className="font-black text-slate-400 mr-1.5 font-sans">{optIdx + 1}</span> {opt}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </section>
            );
        }

        function App() {
            const [currentView, setCurrentView] = useState('landing');

                    return false;
                }

            const [scoreD7, setScoreD7] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_grammar_scoreD7');

                } catch (e) {
                    return 0;
                }
            });

            // Week 2 Day 7 Practice Test Specific States loaded from localStorage
            const [userAnswersW2D7, setUserAnswersW2D7] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_grammar_userAnswersW2D7');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) {
                    return {};
                }
            });
            const [submittedW2D7, setSubmittedW2D7] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_grammar_submittedW2D7');
                    return saved ? localStorage.getItem('ns_grammar_submittedW2D7') === 'true' : false;
                } catch (e) {
                    return false;
                }
            });
            const [scoreW2D7, setScoreW2D7] = useState(() => {
                try {
                    const saved = localStorage.getItem('ns_grammar_scoreW2D7');
                    return saved ? parseInt(saved, 10) : 0;
                } catch (e) {
                    return 0;
                }
            });

            // UI states
            const [showResetConfirm, setShowResetConfirm] = useState(false);

            // Save Translation Preference
            useEffect(() => {
                localStorage.setItem('ns_grammar_showIndoTrans', showIndoTrans.toString());
            }, [showIndoTrans]);

            // Save standard lessons state
            useEffect(() => {
                localStorage.setItem('ns_grammar_userAnswers', JSON.stringify(userAnswers));
            }, [userAnswers]);

            useEffect(() => {
                localStorage.setItem('ns_grammar_submittedDays', JSON.stringify(submittedDays));
            }, [submittedDays]);

            useEffect(() => {
                localStorage.setItem('ns_grammar_scores', JSON.stringify(scores));
            }, [scores]);

            useEffect(() => {
                localStorage.setItem('ns_grammar_understanding', JSON.stringify(grammarUnderstanding));
            }, [grammarUnderstanding]);

            // Save D7 state
            useEffect(() => {
                localStorage.setItem('ns_grammar_userAnswersD7', JSON.stringify(userAnswersD7));
            }, [userAnswersD7]);

            useEffect(() => {
                localStorage.setItem('ns_grammar_submittedD7', submittedD7.toString());
            }, [submittedD7]);

            useEffect(() => {
                localStorage.setItem('ns_grammar_scoreD7', scoreD7.toString());
            }, [scoreD7]);

            // Save W2D7 state
            useEffect(() => {
                localStorage.setItem('ns_grammar_userAnswersW2D7', JSON.stringify(userAnswersW2D7));
            }, [userAnswersW2D7]);

            useEffect(() => {
                localStorage.setItem('ns_grammar_submittedW2D7', submittedW2D7.toString());
            }, [submittedW2D7]);

            useEffect(() => {
                localStorage.setItem('ns_grammar_scoreW2D7', scoreW2D7.toString());
            }, [scoreW2D7]);

            const handleResetAllProgress = () => {
                localStorage.clear();
                setUserAnswers({});
                setSubmittedDays({});
                setScores({});
                setUserAnswersD7({});
                setSubmittedD7(false);
                setScoreD7(0);
                setUserAnswersW2D7({});
                setSubmittedW2D7(false);
                setScoreW2D7(0);
                setGrammarUnderstanding({});
                setShowResetConfirm(false);
            };

            const handleToggleUnderstood = (dayKey, gpNum) => {
                setGrammarUnderstanding(prev => ({
                    ...prev,
                    [`${dayKey}_${gpNum}`]: !prev[`${dayKey}_${gpNum}`]
                }));
            };

            // Selection state handlers for typical lessons
            const handleSelectVal = (dayKey, questionId, val) => {
                if (submittedDays[dayKey]) return;
                setUserAnswers(prev => ({
                    ...prev,
                    [`${dayKey}_${questionId}`]: val
                }));
            };

            const handleSelectSeq = (dayKey, questionId, slotIndex, numValue) => {
                if (submittedDays[dayKey]) return;
                setUserAnswers(prev => {
                    const currentSeq = prev[`${dayKey}_${questionId}`] ? [...prev[`${dayKey}_${questionId}`]] : [null, null, null, null];
                    currentSeq[slotIndex] = numValue;
                    return {
                        ...prev,
                        [`${dayKey}_${questionId}`]: currentSeq
                    };
                });
            };

            const calculateResults = (dayKey) => {
                const lesson = LESSON_DATA[dayKey];
                let correctCount = 0;

                lesson.practice1.forEach(q => {
                    if (q.type === 'dual_mc') {
                        const isAllCorrect = q.parts.every(part => userAnswers[`${dayKey}_${part.id}`] === part.ans);
                        if (isAllCorrect) correctCount++;
                    } else {
                        if (userAnswers[`${dayKey}_${q.id}`] === q.ans) correctCount++;
                    }
                });

                lesson.practice2.forEach(q => {
                    const userSeq = userAnswers[`${dayKey}_${q.id}`] || [null, null, null, null];
                    if (JSON.stringify(userSeq) === JSON.stringify(q.ans)) {
                        correctCount++;
                    }
                });

                setScores(prev => ({ ...prev, [dayKey]: correctCount }));
                setSubmittedDays(prev => ({ ...prev, [dayKey]: true }));
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const resetQuiz = (dayKey) => {
                setSubmittedDays(prev => ({ ...prev, [dayKey]: false }));
                setScores(prev => ({ ...prev, [dayKey]: 0 }));
                setUserAnswers(prev => {
                    const updated = { ...prev };
                    Object.keys(updated).forEach(key => {
                        if (key.startsWith(`${dayKey}_`)) {
                            delete updated[key];
                        }
                    });
                    return updated;
                });
            };

            // Week 1 Day 7 Handlers
            const handleSelectD7 = (qId, optionIdx) => {
                if (submittedD7) return;
                setUserAnswersD7(prev => ({ ...prev, [qId]: optionIdx }));
            };

            const calculateResultsD7 = () => {
                let correctCount = 0;
                QUESTIONS_D7.forEach(q => {
                    if (userAnswersD7[q.id] === q.ans) {
                        correctCount++;
                    }
                });
                setScoreD7(correctCount);
                setSubmittedD7(true);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const resetQuizD7 = () => {
                setUserAnswersD7({});
                setSubmittedD7(false);
                setScoreD7(0);
            };

            // Week 2 Day 7 Handlers
            const handleSelectW2D7 = (qId, optionIdx) => {
                if (submittedW2D7) return;
                setUserAnswersW2D7(prev => ({ ...prev, [qId]: optionIdx }));
            };

            const calculateResultsW2D7 = () => {
                let correctCount = 0;
                QUESTIONS_W2D7.forEach(q => {
                    if (userAnswersW2D7[q.id] === q.ans) {
                        correctCount++;
                    }
                });
                setScoreW2D7(correctCount);
                setSubmittedW2D7(true);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const resetQuizW2D7 = () => {
                setUserAnswersW2D7({});
                setSubmittedW2D7(false);
                setScoreW2D7(0);
            };

            const handleDaySelect = (week, day) => {
                const dayKey = `w${week}d${day}`;
                if (day === 7 && week === 1) {
                    setCurrentView('w1d7');
                } else if (day === 7 && week === 2) {
                    setCurrentView('w2d7'); 
                } else if (LESSON_DATA[dayKey]) {
                    setCurrentView(dayKey);
                } else {
                    setComingSoonDay({ week, day });
                    setCurrentView('coming_soon');
                }
                window.scrollTo({ top: 0 });
            };

            const renderViewContent = () => {
                if (currentView === 'landing') {
                    const totalLessons = 14; 
                    const completedStandardCount = Object.keys(submittedDays).filter(k => submittedDays[k]).length;
                    const completedD7 = submittedD7 ? 1 : 0;
                    const completedW2D7 = submittedW2D7 ? 1 : 0;
                    const totalCompleted = completedStandardCount + completedD7 + completedW2D7;
                    const completionPercentage = Math.round((totalCompleted / totalLessons) * 100);

                    // Calculations for Grammar understanding
                    const totalGrammarPointsCount = Object.values(LESSON_DATA).reduce((acc, lesson) => acc + lesson.grammarPoints.length, 0);

                                            <i className="fa-solid fa-triangle-exclamation"></i>
                                        </div>
                                        <div className="space-y-1">

                                            <button

                                        </div>
                                    </div>

                            <header className="bg-slate-900 text-white shadow-md relative overflow-hidden">

                                        <i className="fa-solid fa-trash-can text-rose-400"></i>

                                        日本語総まとめ N3 : 文法
                                    </span>
                                    <h1 className="text-3xl md:text-4xl font-black tracking-tight mt-1">
                                        学習ダッシュボード

                                                    <span className="bg-emerald-50 text-emerald-700 text-[10px] font-bold px-2.5 py-0.5 rounded-full border border-emerald-200">

                                            </div>
                                            <div className="grid grid-cols-4 gap-3">
                                                {[1, 2, 3, 4, 5, 6, 7].map((dayNum) => {
                                                    const dayKey = `w${weekNum}d${dayNum}`;
                                                    const isAvailable = (weekNum === 1 && (dayNum >= 1 && dayNum <= 7)) || (weekNum === 2 && (dayNum >= 1 && dayNum <= 7));
                                                    
                                                    // Check completion status for day button
                                                    let isCompleted = false;
                                                    if (dayNum === 7) {
                                                        if (weekNum === 1) isCompleted = submittedD7;
                                                        if (weekNum === 2) isCompleted = submittedW2D7;
                                                    } else {
                                                        isCompleted = submittedDays[dayKey] || false;
                                                    }

                                                    // Grammar metrics calculation for typical days
                                                    const lesson = LESSON_DATA[dayKey];
                                                    const hasGrammar = lesson && lesson.grammarPoints;
                                                    const totalGPs = hasGrammar ? lesson.grammarPoints.length : 0;
                                                    const understoodGPs = hasGrammar ? lesson.grammarPoints.filter(gp => grammarUnderstanding[`${dayKey}_${gp.num}`]).length : 0;
                                                    const score = scores[dayKey] || 0;
                                                    const totalPoints = lesson ? (lesson.practice1.length + lesson.practice2.length) : 0;

                                                    return (
                                                        <button
                                                            key={dayNum}
                                                            onClick={() => handleDaySelect(weekNum, dayNum)}
                                                            className={`py-2 px-1.5 rounded-xl border text-center transition-all relative flex flex-col justify-between min-h-[82px] ${
                                                                isAvailable
                                                                    ? isCompleted
                                                                        ? 'bg-emerald-50 border-emerald-300 text-emerald-800 hover:bg-emerald-100/80 hover:shadow-sm scale-100 active:scale-95'
                                                                        : 'bg-emerald-50/40 border-emerald-400 text-emerald-800 hover:bg-emerald-100/80 hover:shadow-sm scale-100 active:scale-95'
                                                                    : 'bg-slate-50 border-slate-200 text-slate-400 hover:bg-slate-100 pointer-events-none opacity-55'
                                                            }`}
                                                        >
                                                            {isCompleted && (
                                                                <span className="absolute -top-1 -right-1 bg-emerald-500 text-white text-[8px] w-4.5 h-4.5 rounded-full flex items-center justify-center shadow-sm z-10">
                                                                    <i className="fa-solid fa-check"></i>
                                                                </span>
                                                            )}
                                                            <div>
                                                                <div className="text-[9px] text-slate-400 font-medium leading-none mb-0.5">
                                                                    {dayNum === 7 ? '実戦' : `${dayNum}日目`}

                                                                <div className="text-xs font-extrabold leading-none mb-1">
                                                                    {dayNum === 7 ? '7日目' : `${dayNum}日`}
                                                                </div>
                                                            </div>

                                                            {isAvailable && (
                                                                <div className="text-[9px] mt-1 space-y-0.5 border-t border-dashed border-slate-200 pt-1 w-full">
                                                                    {dayNum !== 7 ? (
                                                                        <>
                                                                            <div className="text-slate-500 font-bold leading-none" title="Grammar dipahami">
                                                                                <i className="fa-solid fa-book-open text-[8px] mr-0.5 text-indigo-500"></i>
                                                                                {understoodGPs}/{totalGPs}
                                                                            </div>
                                                                            {isCompleted && (
                                                                                <div className="text-emerald-700 font-bold leading-none" title="Skor latihan">
                                                                                    <i className="fa-solid fa-star text-[8px] mr-0.5"></i>
                                                                                    {score}/{totalPoints}
                                                                                </div>
                                                                            )}
                                                                        </>
                                                                    ) : (
                                                                        <div className="text-amber-700 font-bold leading-none" title="Skor ujian">
                                                                            <i className="fa-solid fa-star text-[8px] mr-0.5 text-amber-500"></i>
                                                                            {weekNum === 1 ? (submittedD7 ? `${scoreD7}/${QUESTIONS_D7.length}` : '-') : (submittedW2D7 ? `${scoreW2D7}/${QUESTIONS_W2D7.length}` : '-')}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            )}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </main>

                            <footer className="mt-12 border-t border-slate-200 py-8 text-center text-slate-400 text-xs">
                                <p>© Nihongo Soumatome N3 Bunpou.</p>
                            </footer>
                        </div>
                    );
                }

                if (currentView === 'coming_soon') {
                    return (
                        <div className="min-h-screen bg-slate-50 flex flex-col justify-between font-sans">
                            <header className="bg-slate-900 text-white shadow-md">
                                <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <button 
                                            onClick={() => setCurrentView('landing')} 
                                            className="p-2 hover:bg-slate-800 rounded-lg transition-colors text-slate-300 hover:text-white"
                                        >
                                            <i className="fa-solid fa-arrow-left"></i>
                                        </button>

                                                            {showIndoTrans && q.trans && (
                                                                <div className="text-xs text-indigo-700 bg-indigo-50/50 px-2.5 py-1.5 rounded-lg border border-indigo-100/40 mb-3 italic flex items-center gap-1.5 font-sans">
                                                                    <i className="fa-solid fa-language text-indigo-500 text-sm"></i>
                                                                    <span>{q.trans}</span>
                                                                </div>
                                                            )}

                                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-2.5 max-w-2xl">
                                                                {q.options.map((opt, idx) => {
                                                                    let btnStyle = "bg-slate-50 hover:bg-slate-100 border-slate-200 text-slate-700";
                                                                    if (selectedAnswer === idx) {
                                                                        btnStyle = "bg-slate-800 border-slate-900 text-white ring-2 ring-slate-200";
                                                                    }
                                                                    if (submittedW2D7) {
                                                                        if (idx === q.ans) {
                                                                            btnStyle = "bg-emerald-500 border-emerald-600 text-white font-bold ring-2 ring-emerald-200";
                                                                        } else if (selectedAnswer === idx && selectedAnswer !== q.ans) {
                                                                            btnStyle = "bg-rose-500 border-rose-600 text-white ring-2 ring-rose-200";
                                                                        } else {
                                                                            btnStyle = "bg-slate-50 text-slate-400 border-slate-100 opacity-60 pointer-events-none";
                                                                        }
                                                                    }

                                                                    return (
                                                                        <button key={idx} disabled={submittedW2D7} onClick={() => handleSelectW2D7(q.id, idx)}
                                                                            className={`p-3 text-left rounded-xl border text-sm transition-all flex items-center justify-between japanese-text font-medium ${btnStyle}`}>
                                                                            <span>{opt}</span>
                                                                            {submittedW2D7 && idx === q.ans && <i className="fa-solid fa-circle-check text-white"></i>}
                                                                            {submittedW2D7 && selectedAnswer === idx && selectedAnswer !== q.ans && <i className="fa-solid fa-circle-xmark text-white"></i>}
                                                                        </button>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </section>

                                {/* Mondai 3 */}
                                <section className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 md:p-8 mb-12">
                                    <div className="border-b-2 border-slate-900 pb-4 mb-6">
                                        <span className="text-xs font-bold uppercase tracking-wider text-slate-700 bg-slate-100 px-3 py-1 rounded-full border border-slate-200 font-sans">
                                            問題 3
                                        </span>
                                        <h2 className="text-lg font-bold text-slate-800 mt-3 japanese-text">
                                            次の文章を読んで、２１から２５の中に入る最もよいものを、１・２・３・４から一つ選びなさい。
                                        </h2>
                                    </div>

                                    <div className="bg-slate-50 border border-slate-200 rounded-2xl p-6 md:p-8 mb-8 text-slate-800 text-base md:text-lg tracking-wide leading-loose">
                                        <p className="japanese-text text-justify indent-8 font-medium">
                                            犬 [ 21 ] <ruby>世話<rt>sewa</rt></ruby>がめんどうなだけだと思う人がいるかもしれないが、 [ 22 ] 。
                                            犬も仕事ができる。
                                            仕事 [ 23 ] 新聞を持ってくるとか簡単なもので、仕事 [ 24 ] 遊びのよう思われるだろうか。
                                            確かに、ふつうの犬はそうだが、目や耳の不自由な人を助ける [ 25 ] 本当の仕事ができるすごい犬もいるのである。
                                        </p>
                                        {showIndoTrans && (
                                            <div className="mt-4 pt-4 border-t border-dashed border-slate-200 text-sm text-slate-500 font-sans leading-relaxed">
                                                <span className="font-bold text-indigo-600 block mb-1">Terjemahan Wacana:</span>
                                                Beberapa orang mungkin berpikir bahwa memelihara anjing <strong>[21]</strong> hanya merepotkan saja, tetapi kenyataannya tidak demikian <strong>[22]</strong>. 
                                                Anjing juga bisa melakukan pekerjaan nyata. 
                                                Meskipun dibilang pekerjaan <strong>[23]</strong>, aktivitas itu hanyalah hal mudah seperti membawakan surat kabar, sehingga mungkin terasa seperti sebuah permainan belaka bagi Anda <strong>[24]</strong>. 
                                                Tentu saja hal itu berlaku bagi anjing biasa, tetapi ada juga anjing luar biasa yang bisa melakukan pekerjaan sungguhan <strong>[25]</strong>, misalnya untuk membantu orang-orang dengan keterbatasan penglihatan atau pendengaran.
                                            </div>
                                        )}
                                    </div>

                                    <div className="space-y-8">
                                        {QUESTIONS_W2D7.filter(q => q.section === "Mondai 3").map((q) => {
                                            const selectedAnswer = userAnswersW2D7[q.id];
                                            return (
                                                <div key={q.id} className="p-4 rounded-2xl hover:bg-slate-50 border border-transparent hover:border-slate-100 transition-all">
                                                    <div className="flex items-start gap-3">
                                                        <span className="w-8 h-8 rounded-full bg-slate-100 text-slate-800 flex items-center justify-center font-bold text-sm font-sans">
                                                            {q.id}
                                                        </span>
                                                        <div className="flex-1">
                                                            <p className="text-base font-bold text-slate-800 mb-3 japanese-text">{q.q}</p>
                                                            
                                                            {showIndoTrans && q.trans && (
                                                                <div className="text-xs text-indigo-700 bg-indigo-50/50 px-2.5 py-1.5 rounded-lg border border-indigo-100/40 mb-3 italic flex items-center gap-1.5 font-sans">
                                                                    <i className="fa-solid fa-language text-indigo-500 text-sm"></i>
                                                                    <span>{q.trans}</span>
                                                                </div>
                                                            )}

                                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-2 max-w-2xl">
                                                                {q.options.map((opt, idx) => {
                                                                    let btnStyle = "bg-white hover:bg-slate-50 border-slate-200 text-slate-700";
                                                                    if (selectedAnswer === idx) {
                                                                        btnStyle = "bg-slate-800 border-slate-900 text-white ring-2 ring-slate-200";
                                                                    }
                                                                    if (submittedW2D7) {
                                                                        if (idx === q.ans) {
                                                                            btnStyle = "bg-emerald-500 border-emerald-600 text-white font-bold ring-2 ring-emerald-200";
                                                                        } else if (selectedAnswer === idx && selectedAnswer !== q.ans) {
                                                                            btnStyle = "bg-rose-500 border-rose-600 text-white ring-2 ring-rose-200";
                                                                        } else {
                                                                            btnStyle = "bg-slate-50 text-slate-400 border-slate-100 opacity-60 pointer-events-none";
                                                                        }
                                                                    }

                                                                    return (
                                                                        <button key={idx} disabled={submittedW2D7} onClick={() => handleSelectW2D7(q.id, idx)}
                                                                            className={`p-3 text-left text-sm rounded-xl border transition-all flex items-center justify-between japanese-text font-medium ${btnStyle}`}>
                                                                            <span>{opt}</span>
                                                                            {submittedW2D7 && idx === q.ans && <i className="fa-solid fa-circle-check text-white"></i>}
                                                                            {submittedW2D7 && selectedAnswer === idx && selectedAnswer !== q.ans && <i className="fa-solid fa-circle-xmark text-white"></i>}
                                                                        </button>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </section>

                                <div className="flex flex-col sm:flex-row items-center justify-center gap-4 font-sans">
                                    {!submittedW2D7 ? (
                                        <button onClick={calculateResultsW2D7}
                                            className="w-full sm:w-auto px-10 py-4 bg-slate-900 hover:bg-slate-800 text-white text-base font-black rounded-2xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-paper-plane"></i>
                                            採点する (Nilai Latihan)
                                        </button>
                                    ) : (
                                        <button onClick={resetQuizW2D7}
                                            className="w-full sm:w-auto px-10 py-4 bg-slate-900 hover:bg-slate-800 text-white text-base font-black rounded-2xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-rotate-right"></i>
                                            もう一度解く (Coba Lagi)
                                        </button>
                                    )}
                                </div>
                            </main>

                            <footer className="mt-20 border-t border-slate-200 py-8 text-center text-slate-400 text-xs font-sans">
                                <p>© Nihongo Soumatome N3 Bunpou.</p>
                            </footer>
                        </div>
                    );
                }

                const currentLesson = LESSON_DATA[currentView];
                if (currentLesson) {
                    const totalPoints = currentLesson.practice1.reduce((acc, q) => acc + (q.type === 'dual_mc' ? 1 : 1), 0) + currentLesson.practice2.length;
                    const isSubmitted = submittedDays[currentView] || false;
                    const score = scores[currentView] || 0;

                    return (
                        <div className="min-h-screen pb-20 bg-slate-50">
                            <GrammarHeader title={currentLesson.title} onBack={() => setCurrentView('landing')} />

                            <main className="max-w-4xl mx-auto px-4 md:px-6 mt-8 animate-fade-in">
                                {isSubmitted && (
                                    <QuizResultCard score={score} total={totalPoints} onReset={() => resetQuiz(currentView)} />
                                )}

                                <section className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 md:p-8 mb-8">
                                    <div className="border-b-2 border-slate-900 pb-4 mb-6">
                                        <span className="text-xs font-bold uppercase tracking-wider text-slate-700 bg-slate-100 px-3 py-1 rounded-full border border-slate-200 font-sans">
                                            {currentLesson.badge}
                                        </span>
                                        <h2 className="text-2xl font-extrabold text-slate-800 mt-3 japanese-text">
                                            {currentLesson.grammarTitle}
                                        </h2>
                                    </div>

                                    <div className="space-y-8">
                                        {currentLesson.grammarPoints.map((gp) => (
                                            <GrammarExplanation 
                                                key={gp.num} 
                                                num={gp.num} 
                                                title={gp.title} 
                                                tag={gp.tag} 
                                                desc={gp.desc} 
                                                examples={gp.examples} 
                                                isUnderstood={grammarUnderstanding[`${currentView}_${gp.num}`] || false}
                                                onToggleUnderstood={() => handleToggleUnderstood(currentView, gp.num)}
                                            />
                                        ))}
                                    </div>
                                </section>

                                <PracticePart1 
                                    dayKey={currentView}
                                    questions={currentLesson.practice1} 
                                    answers={userAnswers} 
                                    submitted={isSubmitted} 
                                    onSelect={(qId, val) => handleSelectVal(currentView, qId, val)} 
                                    showIndoTrans={showIndoTrans}
                                    setShowIndoTrans={setShowIndoTrans}
                                />

                                <PracticePart2 
                                    dayKey={currentView}
                                    badgeText="れんしゅう II"
                                    questions={currentLesson.practice2} 
                                    answers={userAnswers} 
                                    submitted={isSubmitted} 
                                    onSelectSeq={(qId, slotIdx, val) => handleSelectSeq(currentView, qId, slotIdx, val)} 
                                    showIndoTrans={showIndoTrans}
                                />

                                <div className="flex flex-col sm:flex-row items-center justify-center gap-4 font-sans">
                                    {!isSubmitted ? (
                                        <button onClick={() => calculateResults(currentView)}
                                            className="w-full sm:w-auto px-10 py-4 bg-slate-900 hover:bg-slate-800 text-white text-base font-black rounded-2xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-paper-plane"></i>
                                            採点する (Nilai Latihan)
                                        </button>
                                    ) : (
                                        <button onClick={() => resetQuiz(currentView)}
                                            className="w-full sm:w-auto px-10 py-4 bg-slate-900 hover:bg-slate-800 text-white text-base font-black rounded-2xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-rotate-right"></i>
                                            もう一度解く (Coba Lagi)
                                        </button>
                                    )}
                                </div>
                            </main>

                            <footer className="mt-20 border-t border-slate-200 py-8 text-center text-slate-400 text-xs font-sans">
                                <p>© Nihongo Soumatome N3 Bunpou.</p>
                            </footer>
                        </div>
                    );
                }

                return null;
            };

            return (
                <div className="min-h-screen bg-slate-50 relative">
                    {renderViewContent()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
